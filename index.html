<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Tiêu đề -->
  <title>TTS • HaMa Tech</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Preview khi gửi link -->
  <meta property="og:title" content="TTS • HaMa Tech">
  <meta property="og:description" content="Smart Solutions • Future Technology">
  <meta property="og:image" content="https://tts.hama.io.vn/logo.png">
  <meta property="og:url" content="https://tts.hama.io.vn">
  <meta property="og:type" content="website">

  <!-- Twitter / Discord -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TTS • HaMa Tech">
  <meta name="twitter:description" content="Smart Solutions • Future Technology">
  <meta name="twitter:image" content="https://tts.hama.io.vn/logo.png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#ffffff;
      font-family:Arial,sans-serif;
    }

    /* iframe */
    iframe{
      width:100%;
      height:100%;
      border:none;
      position:fixed;
      inset:0;
      z-index:1;
      background:#fff;
    }

    /* Loading */
    .loading{
      position:fixed;
      inset:0;
      background:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      transition:opacity .5s ease;
    }

    /* Logo animation */
    .loading img{
      width:140px;
      animation:pulse 1.6s infinite ease-in-out;
      transform-origin:center;
      filter:
        drop-shadow(0 0 12px rgba(0,0,0,.12))
        drop-shadow(0 0 30px rgba(0,0,0,.08));
    }

    @keyframes pulse{
      0%{
        transform:scale(.88);
        opacity:.75;
      }

      50%{
        transform:scale(1.12);
        opacity:1;
      }

      100%{
        transform:scale(.88);
        opacity:.75;
      }
    }

    .loading.hide{
      opacity:0;
      pointer-events:none;
    }
  </style>
</head>

<body>

  <!-- Loading -->
  <div class="loading" id="loading">
    <img src="logo.png" alt="HaMa Tech">
  </div>

  <!-- Website -->
  <iframe
    id="siteFrame"
    src="https://script.google.com/macros/s/AKfycbwrtLgAK-djLst91t_7vz3q8743IHIJavF9rZ8e8B42e9qacetq3-hIiJrfT5DEUb_aXg/exec">
  </iframe>

  <script>
    const frame = document.getElementById("siteFrame");
    const loading = document.getElementById("loading");

    // Ẩn loading khi iframe load xong
    frame.onload = () => {
      loading.classList.add("hide");

      setTimeout(() => {
        loading.style.display = "none";
      }, 500);
    };

    // fallback nếu load lâu
    setTimeout(() => {
      loading.classList.add("hide");

      setTimeout(() => {
        loading.style.display = "none";
      }, 500);
    }, 8000);
  </script>

</body>
</html>
